name: bob-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    # Skip draft PRs and bot-authored PRs to avoid loops
    if: >
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for gh pr diff to resolve merge base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff

      - name: Run Bob Shell review
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          bob --auth-method api-key -p "$(cat <<'EOF'
          You are reviewing a pull request on the IBM/galaxium-travels repo, non-interactively, in CI.
          Read AGENTS.md first to understand this repo's patterns and constraints.
          The PR diff is at /tmp/pr.diff. Read it.

          Write a concise code review to /tmp/review.md as GitHub-flavored markdown:
          - A 1-2 sentence summary at the top.
          - A "Findings" section with the issues you'd raise, each with a file:line reference and a short suggestion. Group by severity (blocker / nit / question).
          - If the diff looks fine, say so plainly. Do not invent issues.
          - Be specific. Do not restate what the diff already shows.
          - Do not approve or block the PR — you are leaving a comment, not a verdict.

          Do not modify any source files. Do not run the test suite. Only write /tmp/review.md.
          EOF
          )"

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.number }} --comment --body-file /tmp/review.md
