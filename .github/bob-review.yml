name: 🤖 Bob Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Bob reviews this PR
    # Skip draft PRs and bot-authored PRs to avoid loops
    if: >
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for gh pr diff to resolve merge base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Run Bob Shell review
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          bob --accept-license --auth-method api-key -p "$(cat <<'EOF'
          You are reviewing a pull request on the IBM/galaxium-travels repo, non-interactively, in CI.
          You must complete ALL analysis steps before writing a single word of the review.
          Do not begin writing findings until you have finished every sub-task in Step 3.

          ## Step 1 — understand the repo
          Read AGENTS.md. Internalise the footguns, conventions, and architectural constraints.

          ## Step 2 — read the diff
          Read pr.diff using the read_file tool (file_path="pr.diff").
          Extract a list of every file that was modified and every symbol (function, class, endpoint,
          schema field) that was added, changed, or removed. Keep this list in mind for Step 3.

          ## Step 3 — mandatory investigation (complete every sub-task; do NOT skip any)
          Work through each item below in order. Do not start writing the review until all are done.

          3a. For every modified file: read the FULL file, not just the diff hunks.
              You need the complete context — surrounding logic, imports, error handling — to reason
              correctly about whether a change is safe.

          3b. For every symbol that was added, changed, or removed: use the grep tool to find every
              caller and reference in the entire repo. Confirm with your own eyes (read_file) that
              each call site is still correct after the change. Do not assume — verify.

          3c. If any endpoint or MCP tool was added or changed: read the consuming side.
              - REST endpoint added/changed → read booking_system_frontend/src/services/api.ts
                and any relevant page/component that calls it.
              - MCP tool added/changed → read the corresponding REST handler in server.py and
                confirm the tool and handler stay in sync.
              - Java proxy endpoint involved → read the Java controller and the Python proxy stub.

          3d. If any Pydantic schema, SQLAlchemy model, or DB column was changed: grep for every
              place that schema or model is imported or instantiated, and read those files.

          3e. Cross-check every finding candidate against AGENTS.md.
              If AGENTS.md explicitly describes the pattern as intentional, it is NOT a bug.

          3f. For each candidate finding: re-read the exact lines in the source file one more time
              to confirm the issue is real before adding it to your list. If you cannot point to a
              specific line you have read, drop the finding.

          ## Step 4 — write the review
          Only after completing all of Step 3, output the review to stdout.
          Do NOT call write_to_file or any file-writing tool. Bracket the review with these two
          marker lines exactly, each on its own line:

          <<<BOB_REVIEW_BEGIN>>>
          ...your review markdown...
          <<<BOB_REVIEW_END>>>

          The review must contain:
          - A 1-2 sentence summary at the top.
          - A "Findings" section. Group by severity: blocker / nit / question.
            Each finding must include:
              * The exact file path and line number you read (not guessed from the diff).
              * A concrete, specific description of the problem.
              * A short, actionable suggestion.
          - If no real issues were found, say so plainly. Do not invent findings.
          - Do not restate what the diff already shows.
          - Do not self-correct or retract findings mid-review — if you are not certain, do not
            raise it. Uncertainty means you need to read more code, not write a hedged finding.
          - Do not approve or block the PR — you are leaving a comment, not a verdict.

          Do not modify any source files. Do not run the test suite. Do not write any files.
          EOF
          )" 2>&1 | tee bob_output.txt

      - name: Extract review from Bob's stdout
        run: |
          python3 -c "
          import re, sys
          text = open('bob_output.txt').read()
          m = re.search(r'<<<BOB_REVIEW_BEGIN>>>(.*?)<<<BOB_REVIEW_END>>>', text, re.DOTALL)
          if m:
              print(m.group(1).strip())
          else:
              print('_Bob did not produce a structured review. Raw output below._\n')
              print(text)
          " > review_body.md
          {
            echo "## 🤖 Bob's Review"
            echo ""
            echo "*Posted by [Bob Shell](https://bob.ibm.com), IBM's CLI agent — running headless on GitHub Actions.*"
            echo ""
            echo "---"
            echo ""
            cat review_body.md
          } > review.md
          echo "--- Final review ---"
          cat review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.number }} --comment --body-file review.md