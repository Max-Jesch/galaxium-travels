name: 🤖 Bob Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Bob reviews this PR
    # Skip draft PRs and bot-authored PRs to avoid loops
    if: >
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for gh pr diff to resolve merge base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Run Bob Shell review
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          bob --accept-license --auth-method api-key -p "$(cat <<'EOF'
          You are reviewing a pull request on the IBM/galaxium-travels repo, non-interactively, in CI.

          ## Step 1 — understand the repo
          Read AGENTS.md first to understand this repo's patterns, footguns, and conventions.

          ## Step 2 — read the diff
          The PR diff is in the file pr.diff. Read it using the read_file tool with file_path="pr.diff".

          ## Step 3 — deep analysis (do this before writing the review)
          For every file touched by the diff:
          a. Read the full file to understand the surrounding context, not just the changed lines.
          b. Identify every function, class, or symbol that was added, removed, or renamed.
          c. Use the grep tool to search the entire repo for callers and usages of those symbols.
             Check whether any call sites are now broken, passing wrong arguments, or relying on
             behaviour that the diff changed.
          d. If the diff touches a REST endpoint or an MCP tool, verify the other side of the
             contract (e.g. frontend api.ts, MCP tool definitions, Java proxy calls) is consistent.
          e. If the diff touches shared schemas, models, or DB migrations, check all consumers.
          f. Cross-reference every change against the footguns and conventions in AGENTS.md.

          ## Step 4 — write the review
          PRINT your code review to stdout — do NOT call write_to_file or any file-writing tool.
          Bracket the review with these two marker lines exactly, each on its own line:

          <<<BOB_REVIEW_BEGIN>>>
          ...your review markdown...
          <<<BOB_REVIEW_END>>>

          The review must contain:
          - A 1-2 sentence summary at the top.
          - A "Findings" section with the issues you'd raise, each with a file:line reference and a short suggestion. Group by severity (blocker / nit / question).
          - If the diff looks fine, say so plainly. Do not invent issues.
          - Be specific. Do not restate what the diff already shows.
          - Do not approve or block the PR — you are leaving a comment, not a verdict.

          Do not modify any source files. Do not run the test suite. Do not write any files.
          EOF
          )" 2>&1 | tee bob_output.txt

      - name: Extract review from Bob's stdout
        run: |
          python3 -c "
          import re, sys
          text = open('bob_output.txt').read()
          m = re.search(r'<<<BOB_REVIEW_BEGIN>>>(.*?)<<<BOB_REVIEW_END>>>', text, re.DOTALL)
          if m:
              print(m.group(1).strip())
          else:
              print('_Bob did not produce a structured review. Raw output below._\n')
              print(text)
          " > review_body.md
          {
            echo "## 🤖 Bob's Review"
            echo ""
            echo "*Posted by [Bob Shell](https://bob.ibm.com), IBM's CLI agent — running headless on GitHub Actions.*"
            echo ""
            echo "---"
            echo ""
            cat review_body.md
          } > review.md
          echo "--- Final review ---"
          cat review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.number }} --comment --body-file review.md