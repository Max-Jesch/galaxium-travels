version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: galaxium_booking
      POSTGRES_USER: galaxium
      POSTGRES_PASSWORD: local_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxium"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: galaxium-backend:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://galaxium:local_dev_password@postgres:5432/galaxium_booking
      CORS_ORIGINS: http://localhost:3000,http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/api/', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    image: galaxium-frontend:latest
    platform: linux/amd64
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:

